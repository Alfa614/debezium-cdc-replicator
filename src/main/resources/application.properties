# ---- Source: SQL Server ----
debezium.database.hostname=localhost
debezium.database.port=1433
debezium.database.user=<YOUR-USERNAME>
debezium.database.password=<YOUR-PASSWORD>
debezium.database.dbname=<YOUR-DB-NAME>
debezium.database.encrypt=false
debezium.topic.prefix=sqlserver1

# ---- Offset + Schema History storage (saved in PostgreSQL) ----
debezium.offset.storage.jdbc.url=jdbc:postgresql://localhost:5432/cdc_dest
debezium.offset.storage.jdbc.user=postgres
debezium.offset.storage.jdbc.password=<YOUR-PASSWORD>

# ---- Target: PostgreSQL ----
target.jdbc.url=jdbc:postgresql://localhost:5432/cdc_dest
target.jdbc.user=postgres
target.jdbc.password=<YOUR-PASSWORD>
